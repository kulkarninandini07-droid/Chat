<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyberChat - Neon Terminal</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:monospace;
}

body{
background:black;
color:#00ff9c;
overflow:hidden;
}

/* SPECTACULAR LOGIN BACKGROUND */
.login-page{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
position:relative;
background: 
radial-gradient(circle at 20% 80%, #00ff9c20 0%, transparent 50%),
radial-gradient(circle at 80% 20%, #00ff9c15 0%, transparent 50%),
radial-gradient(circle at 40% 40%, #00ff9c10 0%, transparent 50%);
animation:loginBgShift 8s ease-in-out infinite;
}

@keyframes loginBgShift{
0%, 100%{background-position:0% 50%, 100% 50%, 50% 50%;}
33%{background-position:0% 0%, 100% 100%, 50% 50%;}
66%{background-position:100% 100%, 0% 0%, 50% 50%;}
}

/* FIXED CANVAS */
#particles, #chatParticles{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
z-index:0;
pointer-events:none !important;
}

/* SCANLINES + GLOW */
.scanlines{
position:fixed;
width:100%;
height:100%;
background:repeating-linear-gradient(
to bottom,
transparent,
transparent 2px,
rgba(0,255,156,0.05) 3px
);
z-index:1;
pointer-events:none;
animation:scanlineFloat 20s linear infinite;
}

@keyframes scanlineFloat{
0%{transform:translateY(0);}
100%{transform:translateY(-4px);}
}

/* ULTRA LOGIN BOX */
.login-box{
width:500px;
padding:50px 70px;
background:linear-gradient(145deg, rgba(0,0,0,0.9), rgba(0,20,15,0.95));
border:3px solid transparent;
background-clip:padding-box;
position:relative;
box-shadow:
0 0 100px #00ff9c50,
0 0 200px #00ff9c30,
inset 0 0 50px #00ff9c10,
0 0 50px rgba(0,255,156,0.3);
backdrop-filter:blur(20px) saturate(1.3);
text-align:center;
z-index:3;
border-radius:20px;
overflow:hidden;
animation:loginFloat 6s ease-in-out infinite;
}

.login-box::before{
content:'';
position:absolute;
inset:0;
background:conic-gradient(from 0deg, transparent 0deg, #00ff9c20 90deg, transparent 180deg);
animation:loginBorderRotate 3s linear infinite;
z-index:-1;
border-radius:20px;
}

@keyframes loginFloat{
0%, 100%{transform:translateY(0px);}
50%{transform:translateY(-10px);}
}

@keyframes loginBorderRotate{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

.logo{
font-size:48px;
letter-spacing:10px;
margin-bottom:20px;
text-shadow:0 0 40px #00ff9c80, 0 0 80px #00ff9c40;
font-weight:bold;
animation:logoGlow 2s ease-in-out infinite alternate;
}

@keyframes logoGlow{
0%{text-shadow:0 0 40px #00ff9c80, 0 0 80px #00ff9c40;}
100%{text-shadow:0 0 60px #00ff9c, 0 0 120px #00ff9c60;}
}

.subtitle{
font-size:15px;
margin-bottom:35px;
color:#00ff9c80;
letter-spacing:2px;
animation:subtitlePulse 3s ease-in-out infinite;
}

@keyframes subtitlePulse{
0%, 100%{opacity:0.7;}
50%{opacity:1;}
}

.login-box input,
.login-box select{
width:100%;
padding:18px;
margin-bottom:20px;
background:rgba(0,0,0,0.85);
border:2px solid #00ff9c40;
color:#00ff9c;
font-size:17px;
transition:0.3s;
border-radius:12px;
font-family:monospace;
}

.login-box input:focus,
.login-box select:focus{
outline:none;
border-color:#00ff9c;
box-shadow:0 0 30px #00ff9c60;
transform:scale(1.02);
}

.login-box button{
width:100%;
padding:18px;
background:linear-gradient(145deg, #00ff9c, #00e68a);
border:none;
font-weight:bold;
cursor:pointer;
font-size:17px;
border-radius:12px;
transition:0.3s;
box-shadow:0 0 30px #00ff9c60;
animation:buttonPulse 2s infinite;
margin-top:10px;
}

@keyframes buttonPulse{
0%, 100%{box-shadow:0 0 30px #00ff9c60;}
50%{box-shadow:0 0 50px #00ff9c80;}
}

.login-box button:hover{
box-shadow:0 0 60px #00ff9c, 0 0 100px #00ff9c80;
transform:translateY(-3px) scale(1.02);
}

/* MAIN APP */
.app{display:flex;height:100vh;}
.hidden{display:none;}

/* SIDEBAR */
.sidebar{
width:280px;
background:linear-gradient(180deg, rgba(0,0,0,0.95), rgba(0,25,18,0.95));
border-right:1px solid #00ff9c20;
padding:25px;
display:flex;
flex-direction:column;
z-index:3;
overflow:hidden;
}

.online-users{
background:#00ff9c15;
padding:12px;
border-radius:8px;
margin-bottom:20px;
text-align:center;
border:1px solid #00ff9c20;
}

.profile-box{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.avatar{width:45px;height:45px;border-radius:50%;background:linear-gradient(145deg, #00ff9c40, #00ff9c20);border:2px solid #00ff9c;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 10px #00ff9c40;}50%{box-shadow:0 0 25px #00ff9c80;}}

.profile-info span{font-size:14px;}
.profile-info .role{color:#00ff9c60;}

#roomList{list-style:none;flex:1;overflow-y:auto;margin:0;padding:0;}
#roomList li{padding:14px;cursor:pointer;transition:0.3s;border-left:4px solid transparent;border-radius:0 8px 8px 0;margin-bottom:4px;}
#roomList li:hover{background:#00ff9c20;border-left:4px solid #00ff9c;padding-left:18px;box-shadow:0 0 15px #00ff9c40;transform:translateX(4px);}

.create-node{
margin-top:15px;
padding:12px 16px;
background:#00ff9c20;
border:1px solid #00ff9c30;
border-radius:8px;
cursor:pointer;
transition:0.3s;
text-align:center;
font-size:14px;
}

.create-node:hover{
background:#00ff9c30;
border-color:#00ff9c;
box-shadow:0 0 20px #00ff9c40;
}

/* CHAT AREA */
.chat-area{flex:1;display:flex;flex-direction:column;background:radial-gradient(circle at center,#001a12,#000);position:relative;z-index:2;overflow:hidden;}
.chat-header{padding:25px;border-bottom:1px solid #00ff9c20;}
.room-info h2{margin:0 0 5px 0;}
.room-desc{color:#00ff9c60;font-size:14px;}

.messages{flex:1;overflow-y:auto;padding:35px;}
.message{background:linear-gradient(145deg, #00ff9c15, #00ff9c10);border-left:4px solid #00ff9c;padding:16px 20px;margin-bottom:18px;max-width:65%;border-radius:0 12px 12px 12px;transition:0.3s;position:relative;word-wrap:break-word;}
.message:hover{background:linear-gradient(145deg, #00ff9c25, #00ff9c20);box-shadow:0 0 20px #00ff9c50;transform:translateX(4px);}
.username{color:#00ff9c80;font-weight:bold;font-size:14px;margin-right:8px;}

.message-input{display:flex;padding:25px;border-top:1px solid #00ff9c20;gap:12px;}
.message-input input{flex:1;padding:16px;background:rgba(0,0,0,0.8);border:2px solid #00ff9c30;color:#00ff9c;font-size:16px;border-radius:12px;transition:0.3s;}
.message-input input:focus{outline:none;border-color:#00ff9c;box-shadow:0 0 25px #00ff9c40;}
.message-input button{padding:16px 28px;background:linear-gradient(145deg, #00ff9c, #00e68a);border:none;font-weight:bold;cursor:pointer;font-size:16px;border-radius:12px;transition:0.3s;box-shadow:0 0 25px #00ff9c40;white-space:nowrap;}
.message-input button:hover{box-shadow:0 0 40px #00ff9c80;transform:translateY(-2px);}

/* SCROLLBAR */
::-webkit-scrollbar{width:8px;}
::-webkit-scrollbar-thumb{background:linear-gradient(#00ff9c40, #00ff9c20);border-radius:4px;}
::-webkit-scrollbar-track{background:rgba(0,255,156,0.05);}


/* HEX GRID BACKGROUND */
.hex-grid{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:0;
opacity:0.25;

background:
linear-gradient(30deg,#00ff9c20 12%,transparent 12.5%,transparent 87%,#00ff9c20 87.5%,#00ff9c20),
linear-gradient(150deg,#00ff9c20 12%,transparent 12.5%,transparent 87%,#00ff9c20 87.5%,#00ff9c20),
linear-gradient(30deg,#00ff9c20 12%,transparent 12.5%,transparent 87%,#00ff9c20 87.5%,#00ff9c20),
linear-gradient(150deg,#00ff9c20 12%,transparent 12.5%,transparent 87%,#00ff9c20 87.5%,#00ff9c20),
linear-gradient(60deg,#00ff9c15 25%,transparent 25.5%,transparent 75%,#00ff9c15 75%,#00ff9c15),
linear-gradient(60deg,#00ff9c15 25%,transparent 25.5%,transparent 75%,#00ff9c15 75%,#00ff9c15);

background-size:80px 140px;
background-position:
0 0,
0 0,
40px 70px,
40px 70px,
0 0,
40px 70px;

animation:hexMove 40s linear infinite;
}

@keyframes hexMove{
0%{transform:translateY(0);}
100%{transform:translateY(-140px);}
}

</style>
</head>

<body>

<!-- LOGIN PAGE -->
<div class="login-page" id="loginPage">

<canvas id="particles"></canvas>

<!-- ADDED HEX GRID -->
<div class="hex-grid"></div>

<div class="scanlines"></div>

<div class="login-box">
<div class="logo">CYBERCHAT</div>
<div class="subtitle">NEON TERMINAL AUTHENTICATION</div>

<input type="text" id="username" placeholder="Username or Email" required>
<input type="password" id="password" placeholder="Password" required>

<select id="role" required>
<option value="">Select Role</option>
<option value="admin">Admin</option>
<option value="manager">Manager</option>
<option value="employee">Employee</option>
</select>

<button onclick="login()">ACCESS TERMINAL</button>
</div>
</div>

<!-- MAIN APP -->
<div class="app hidden" id="app">

<div class="sidebar">

<div class="online-users">
<div>🟢 12 ONLINE</div>
</div>

<div class="profile-box">
<div class="avatar"></div>
<div class="profile-info">
<div>neon_user</div>
<div class="role">ADMIN</div>
</div>
</div>

<ul id="roomList"></ul>
<div class="create-node" onclick="createRoom()">
➕ CREATE NODE
</div>

</div>

<div class="chat-area">

<canvas id="chatParticles"></canvas>

<div class="chat-header">
<div class="room-info">
<h2>🌐 General</h2>
<div class="room-desc">45 users online • Public channel</div>
</div>
</div>

<div class="messages" id="messages">

<div class="message">
<div><span class="username">neon_admin:</span> Welcome to CyberChat terminal! 🚀</div>
</div>

<div class="message">
<div><span class="username">matrix_user:</span> Matrix connection established. All systems nominal.</div>
</div>

</div>

<div class="message-input">
<input type="text" id="messageInput" placeholder="Type your message..." onkeypress="handleKeyPress(event)">
<button onclick="sendMessage()">TRANSMIT</button>
</div>

</div>
</div>


    
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
const socket = io();

let username="";
let user_id="";
let role="";
let currentRoom="general";

function login(){

const uname=document.getElementById('username').value;
const password=document.getElementById('password').value;
const r=document.getElementById('role').value;

if(uname && password && r){

fetch("/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
username:uname,
password:password,
role:r
})
})
.then(res=>res.json())
.then(data=>{

if(data.status==="success"){

username=data.username;
user_id=data.user_id;
role=data.role;

document.getElementById('loginPage').classList.add('hidden');
document.getElementById('app').classList.remove('hidden');

document.querySelector('.profile-info div:first-child').textContent=username;
document.querySelector('.profile-info .role').textContent=role.toUpperCase();

socket.emit("joinUser",{
username:username,
user_id:user_id,
role:role
});

}else{
alert("Login failed");
}

});

}else{
alert('Please fill all fields');
}

}


function sendMessage(){

const input=document.getElementById('messageInput');
const message=input.value.trim();

if(message==="") return;

socket.emit("chatMessage",{
user_id:user_id,
username:username,
room:currentRoom,
text:message
});

input.value="";

}


function handleKeyPress(event){
if(event.key==='Enter'){
sendMessage();
}
}


function createRoom(){
alert('Create new room functionality');
}


/* RECEIVE MESSAGE */

socket.on("message",function(data){

const messages=document.getElementById("messages");

const newMessage=document.createElement("div");
newMessage.className="message";

newMessage.innerHTML=`<div><span class="username">${data.user}:</span> ${data.text}</div>`;

messages.appendChild(newMessage);
messages.scrollTop=messages.scrollHeight;

});


/* ROOM LIST FROM BACKEND */

socket.on("roomList",function(rooms){

const roomList=document.getElementById("roomList");

roomList.innerHTML="";

rooms.forEach(room=>{

const li=document.createElement("li");

li.innerText=room;

li.onclick=function(){
joinRoom(room);
};

roomList.appendChild(li);

});

});


/* JOIN ROOM */

function joinRoom(room){

currentRoom=room;

socket.emit("joinRoom",{
room:data,
username:username
});

document.querySelector('.room-info h2').textContent=room;

document.getElementById("messages").innerHTML="";

}


/* LOAD OLD MESSAGES */

socket.on("loadMessages",function(messages){

const box=document.getElementById("messages");

box.innerHTML="";

messages.forEach(data=>{

const div=document.createElement("div");

div.className="message";

div.innerHTML=`<div><span class="username">${data.user}:</span> ${data.text}</div>`;

box.appendChild(div);

});

});

</script>





</body>
</html>
