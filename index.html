<!DOCTYPE html>
<html>
<head>
    <title>EngineerNet - Internal Messaging</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="loginPage">
    <h2>Internal Network</h2>
    <input type="text" id="username" placeholder="Enter username">
    <button onclick="joinSystem()">Join</button>
</div>

<div id="chatPage" style="display:none">

    <div class="container">

        <div class="rooms">
            <h3>Rooms</h3>
            <ul id="roomList"></ul>
        </div>

        <div class="chat">

            <div id="messages"></div>

            <div class="inputBox">
                <input id="messageInput" placeholder="Type message or command...">
                <button onclick="sendMessage()">Send</button>
            </div>

        </div>

    </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>

</body>
</html>
